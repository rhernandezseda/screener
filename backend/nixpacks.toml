[phases.setup]
nixPkgs = ["python311", "chromium", "nss", "nspr", "atk", "cups", "libdrm", "mesa", "libgbm", "pango", "cairo", "xorg.libX11", "xorg.libXcomposite", "xorg.libXdamage", "xorg.libXext", "xorg.libXfixes", "xorg.libXrandr", "xorg.libxcb", "xorg.libXkbcommon"]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "which chromium > .chromium_path || which chromium-browser >> .chromium_path || true"
]

[variables]
PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"

[start]
cmd = "python server.py"
