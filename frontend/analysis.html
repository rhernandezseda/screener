<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farseer · Stock Analysis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --surface:        #0f1117;
    --surface-card:   #1a1d27;
    --surface-border: #2a2d3a;
    --accent:         #6366f1;
    --gain:           #22c55e;
    --gain-dim:       #15803d;
    --loss:           #ef4444;
    --warn:           #f59e0b;
    --text:           #e5e7eb;
    --muted:          #9ca3af;
    --dim:            #6b7280;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
    background: var(--surface);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  #root-wrap {
    position: relative;
    min-height: 100vh;
    background-color: var(--surface);
    background-image: radial-gradient(rgba(255,255,255,0.08) 1px, transparent 1px);
    background-size: 28px 28px;
  }
  #root-wrap::before {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    top: -180px; right: -180px;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
    background: radial-gradient(circle, rgba(99,102,241,0.35) 0%, transparent 70%);
  }
  #root-wrap::after {
    content: '';
    position: fixed;
    width: 500px; height: 500px;
    bottom: -150px; left: -150px;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
    background: radial-gradient(circle, rgba(20,184,166,0.28) 0%, transparent 70%);
  }

  * {
    scrollbar-width: thin;
    scrollbar-color: var(--surface-border) transparent;
  }
  *::-webkit-scrollbar { width: 6px; height: 6px; }
  *::-webkit-scrollbar-track { background: transparent; }
  *::-webkit-scrollbar-thumb { background-color: var(--surface-border); border-radius: 3px; }

  /* ── NAV ── */
  .nav {
    position: relative;
    z-index: 10;
    background: rgba(26,29,39,0.9);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--surface-border);
    padding: 12px 48px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .nav a {
    color: var(--dim);
    text-decoration: none;
    font-size: 12px;
    transition: color 0.15s;
  }
  .nav a:hover { color: var(--accent); }
  .nav-sep { color: var(--surface-border); }
  .nav-current { color: var(--muted); font-size: 12px; }

  /* ── HERO ── */
  .hero {
    position: relative;
    z-index: 1;
    padding: 40px 48px 36px;
    border-bottom: 1px solid var(--surface-border);
  }
  .hero-top {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }
  .logo-box {
    background: var(--surface-card);
    border: 1px solid var(--surface-border);
    border-radius: 12px;
    width: 80px; height: 80px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; overflow: hidden; padding: 8px;
  }
  .logo-box img { width: 64px; height: 64px; object-fit: contain; }
  .logo-fallback {
    color: var(--muted); font-size: 18px; font-weight: 600;
    text-align: center; letter-spacing: -1px;
  }
  .hero-title { flex: 1; }
  .hero-title h1 {
    font-size: 28px; color: #fff; font-weight: 600;
    letter-spacing: -0.5px; margin-bottom: 6px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .ticker-badge {
    border: 1px solid rgba(99,102,241,0.4);
    background: rgba(99,102,241,0.1);
    color: var(--accent);
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 14px;
    font-weight: 600;
  }
  .hero-sub {
    color: var(--dim);
    font-size: 11px;
  }

  /* stat strip */
  .stat-strip {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .stat-card {
    background: var(--surface-card);
    border: 1px solid var(--surface-border);
    border-radius: 6px;
    padding: 12px 16px;
    min-width: 120px;
  }
  .stat-card-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--dim);
    margin-bottom: 6px;
  }
  .stat-card-val {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .stat-card-val.accent { color: var(--accent); }
  .stat-card-val.green  { color: var(--gain); }
  .stat-card-val.red    { color: var(--loss); }

  /* ── SECTIONS ── */
  .section { position: relative; z-index: 1; padding: 36px 48px; }
  .section + .section { padding-top: 0; }
  .section-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--surface-border);
  }

  /* ── ABOUT ── */
  .about-card {
    background: var(--surface-card);
    border: 1px solid var(--surface-border);
    border-radius: 8px;
    padding: 24px 28px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
  }
  .about-meta {
    display: flex;
    gap: 24px;
    margin-top: 16px;
    flex-wrap: wrap;
    padding-top: 16px;
    border-top: 1px solid var(--surface-border);
  }
  .meta-item { font-size: 12px; color: var(--dim); }
  .meta-item strong { color: var(--muted); display: block; font-size: 13px; margin-bottom: 1px; }

  /* ── FUNDAMENTALS ── */
  .fund-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 800px) { .fund-grid { grid-template-columns: 1fr; } }

  .fund-table {
    background: var(--surface-card);
    border: 1px solid var(--surface-border);
    border-radius: 8px;
    overflow: hidden;
  }
  .fund-table-header {
    padding: 12px 16px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--surface-border);
  }
  .fund-table-header.accent-header { color: var(--accent); }
  .fund-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px;
    font-size: 12px;
    border-bottom: 1px solid var(--surface-border);
  }
  .fund-row:last-child { border-bottom: none; }
  .fund-row:hover { background: rgba(255,255,255,0.02); }
  .fund-row-label { color: var(--dim); }
  .fund-row-val { font-weight: 500; color: var(--text); font-variant-numeric: tabular-nums; }
  .fund-row-val.pos { color: var(--gain); }
  .fund-row-val.neg { color: var(--loss); }

  /* ── TECHNICALS ── */
  .tech-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 800px) { .tech-grid { grid-template-columns: 1fr; } }

  .tech-dark {
    background: var(--surface-card);
    border: 1px solid var(--surface-border);
    border-radius: 8px;
    padding: 28px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .tech-pct {
    font-size: 64px;
    font-weight: 600;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 20px;
    font-variant-numeric: tabular-nums;
  }
  .tech-pct.pos { color: var(--gain); }
  .tech-pct.neg { color: var(--loss); }
  .tech-detail { font-size: 12px; color: var(--dim); margin-bottom: 6px; }
  .tech-detail strong { color: var(--muted); }

  .tech-light {
    background: var(--surface-card);
    border: 1px solid var(--surface-border);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    padding: 24px;
  }
  .tech-light h3 {
    font-size: 12px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 16px; color: var(--muted);
  }
  .tech-light ul { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  .tech-light li {
    font-size: 12px; color: var(--text); line-height: 1.6;
    padding-left: 16px; position: relative;
  }
  .tech-light li::before {
    content: '→';
    position: absolute; left: 0;
    color: var(--accent); font-weight: 600;
  }

  /* ── CHART ── */
  .chart-section { position: relative; z-index: 1; padding: 0 48px 36px; }
  .chart-wrap {
    background: var(--surface-card);
    border: 1px solid var(--surface-border);
    border-radius: 8px;
    overflow: hidden;
  }
  .chart-wrap iframe {
    width: 100%;
    height: 520px;
    border: none;
    display: block;
  }

  /* ── FINANCIALS TABLE ── */
  .fin-table-wrap {
    background: var(--surface-card);
    border: 1px solid var(--surface-border);
    border-radius: 8px;
    overflow-x: auto;
  }
  .fin-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .fin-table thead th {
    background: var(--surface);
    color: var(--dim);
    padding: 10px 14px;
    text-align: right;
    font-weight: 600;
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-size: 10px;
    border-bottom: 1px solid var(--surface-border);
  }
  .fin-table thead th:first-child { text-align: left; }
  .fin-table tbody tr:hover { background: rgba(255,255,255,0.02); }
  .fin-table tbody td {
    padding: 9px 14px;
    text-align: right;
    border-bottom: 1px solid var(--surface-border);
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
    color: var(--text);
  }
  .fin-table tbody tr.priority-row td { background: rgba(99,102,241,0.05); }
  .fin-table tbody tr.priority-row td:first-child { color: var(--text); font-weight: 600; }
  .fin-table tbody tr.priority-sep td { border-bottom: 2px solid var(--surface-border); }
  .fin-table tbody td:first-child { text-align: left; color: var(--muted); font-weight: 500; }
  .fin-table thead th:nth-child(2) { color: var(--accent); background: rgba(99,102,241,0.1); }
  .fin-table tbody td:nth-child(2) { background: rgba(99,102,241,0.05); font-weight: 600; color: var(--text); }
  .fin-table tbody tr.priority-row td:nth-child(2) { background: rgba(99,102,241,0.12); }

  /* ── NEWS ── */
  .news-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
  }
  .news-card {
    background: var(--surface-card);
    border: 1px solid var(--surface-border);
    border-radius: 8px;
    padding: 16px;
    text-decoration: none;
    color: inherit;
    border-top: 2px solid var(--accent);
    transition: border-color 0.15s, transform 0.15s;
    display: block;
  }
  .news-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .news-date { font-size: 10px; color: var(--dim); margin-bottom: 6px; }
  .news-title { font-size: 12px; font-weight: 500; line-height: 1.5; color: var(--text); }

  .btn-reanalyze {
    background: rgba(99,102,241,0.1);
    border: 1px solid rgba(99,102,241,0.3);
    color: var(--accent);
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    letter-spacing: 0.3px;
  }
  .btn-reanalyze:hover { background: rgba(99,102,241,0.2); border-color: var(--accent); }
  .btn-reanalyze:disabled { opacity: 0.5; cursor: wait; }

  /* ── FOOTER ── */
  footer {
    position: relative;
    z-index: 1;
    border-top: 1px solid var(--surface-border);
    padding: 20px 48px;
    font-size: 11px;
    color: var(--dim);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }

  /* ── LOADING / ERROR ── */
  .state-screen {
    position: relative;
    z-index: 1;
    min-height: 80vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px;
  }
  .state-screen h2 { font-size: 20px; margin-bottom: 12px; color: var(--text); }
  .state-screen p  { color: var(--dim); font-size: 13px; line-height: 1.6; }
  .cli-box {
    background: var(--surface-card);
    border: 1px solid var(--surface-border);
    color: var(--gain);
    font-family: inherit;
    font-size: 13px;
    padding: 14px 24px;
    border-radius: 8px;
    margin: 16px 0;
    letter-spacing: 0.3px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--surface-border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 640px) {
    .nav, .section, .chart-section, footer { padding-left: 16px; padding-right: 16px; }
    .hero { padding: 24px 16px; }
    .hero-title h1 { font-size: 20px; }
    .tech-pct { font-size: 44px; }
  }
</style>
</head>
<body>
<div id="root-wrap">

<!-- NAV -->
<nav class="nav">
  <a href="screener.html">← Screener</a>
  <span class="nav-sep">/</span>
  <span class="nav-current" id="navTicker">Analysis</span>
  <button class="btn-reanalyze" id="btnReanalyze" style="margin-left:auto" onclick="reanalyze()">↺ Re-analyze</button>
</nav>

<!-- MAIN CONTENT (rendered by JS) -->
<div id="app">
  <div class="state-screen">
    <div class="spinner"></div>
    <h2>Loading analysis…</h2>
    <p>Reading data file for this ticker.</p>
  </div>
</div>

</div>

<script src="config.js"></script>
<script>
// ── Utilities ──
function pct(val) {
  if (!val || val === 'N/A') return val || 'N/A';
  const n = parseFloat(val);
  if (isNaN(n)) return val;
  return n >= 0
    ? `<span style="color:var(--gain)">+${val}</span>`
    : `<span style="color:var(--loss)">${val}</span>`;
}

function statCardColor(val) {
  const n = parseFloat((val || '').replace(/[^0-9.\-]/g, ''));
  if (isNaN(n)) return '';
  return n >= 0 ? 'green' : 'red';
}

function techPctClass(val) {
  const n = parseFloat((val || '').replace(/[^0-9.\-]/g, ''));
  if (isNaN(n)) return '';
  return n >= 0 ? 'pos' : 'neg';
}

function tvExchange(exchange) {
  if (!exchange) return 'NASDAQ';
  if (exchange.toUpperCase().includes('NYSE')) return 'NYSE';
  return 'NASDAQ';
}

const DOLLAR_ROW_KEYWORDS = [
  'Revenue', 'Cost', 'Profit', 'Income', 'Expense', 'EBITDA', 'EBIT',
  'Cash Flow', 'Cash', 'Depreciation', 'Amortization', 'Research', 'Selling',
  'General', 'Admin', 'Operating', 'Non-Operating', 'Pretax', 'Tax', 'Interest'
];
function isDollarRow(label) {
  return DOLLAR_ROW_KEYWORDS.some(k => label.includes(k));
}
function fmtCell(label, val) {
  if (!val || val === '-' || val === '—') return val;
  if (!isDollarRow(label)) return val;
  if (val.startsWith('-')) return `-${val.slice(1)}$`;
  return `${val}$`;
}

// ── Render ──
function render(d) {
  const ov = d.overview || {};
  const fin = d.financials || {};
  const news = d.news       || [];
  const ticker = d.ticker;

  const genDate = new Date(d.generated_at).toLocaleString('en-US', {
    month: 'long', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit'
  });

  document.title = `${ticker} · Farseer`;
  document.getElementById('navTicker').textContent = ticker;

  const price    = ov.price_raw || ov.stats?.['Stock Price'] || 'N/A';
  const mktCap   = ov.market_cap || 'N/A';
  const hi52w    = ov.high_52w   || 'N/A';
  const lo52w    = ov.low_52w    || 'N/A';
  const pe       = ov.pe_ratio   || 'N/A';

  const finHeaders = fin.headers || [];
  const PRIORITY_ROWS = ['Revenue', 'Revenue Growth (YoY)', 'EPS (Basic)', 'EPS Growth'];
  const allFinRows = Object.entries(fin).filter(([k]) => k !== 'headers' && k !== 'quarters');

  const priorityRows = PRIORITY_ROWS
    .map(k => allFinRows.find(([key]) => key === k))
    .filter(Boolean);
  const restRows = allFinRows.filter(([k]) => !PRIORITY_ROWS.includes(k));
  const finRows = [...priorityRows, ...restRows].slice(0, 16);

  const hi52wNum = parseFloat((hi52w || '').replace(/[^0-9.]/g, '')) || null;
  const priceNum = parseFloat((price || '').replace(/[^0-9.]/g, '')) || null;
  let distPct = 'N/A';
  if (hi52wNum && priceNum && hi52wNum > 0) {
    const d = ((priceNum - hi52wNum) / hi52wNum * 100).toFixed(1);
    distPct = `${d > 0 ? '+' : ''}${d}%`;
  }

  const newsHTML = news.length
    ? news.map(n => `
        <a class="news-card" href="${n.url}" target="_blank" rel="noopener">
          <div class="news-date">${n.date || ''}</div>
          <div class="news-title">${n.title}</div>
        </a>`).join('')
    : '<p style="color:var(--dim);font-size:12px">No recent news found.</p>';

  const metaFields = [
    ['Sector',    ov.sector],
    ['Industry',  ov.industry],
    ['Employees', ov.employees],
    ['Founded',   ov.founded],
    ['Country',   ov.country],
  ].filter(([,v]) => v && v !== 'N/A');

  document.getElementById('app').innerHTML = `
    <!-- HERO -->
    <header class="hero">
      <div class="hero-top">
        <div class="logo-box">
          <img src="https://financialmodelingprep.com/image-stock/${ticker}.png"
               alt="${ticker}"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <span class="logo-fallback" style="display:none">${ticker}</span>
        </div>
        <div class="hero-title">
          <h1>
            ${ov.name || ticker}
            <span class="ticker-badge">${ticker}</span>
          </h1>
          <p class="hero-sub">Fundamental &amp; Technical Analysis · ${genDate}</p>
        </div>
      </div>
      <div class="stat-strip">
        <div class="stat-card">
          <div class="stat-card-label">Current Price</div>
          <div class="stat-card-val">${price}</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Market Cap</div>
          <div class="stat-card-val">${mktCap}</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Revenue TTM</div>
          <div class="stat-card-val">${ov.revenue_ttm || 'N/A'}</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">EPS TTM</div>
          <div class="stat-card-val">${ov.eps_ttm || 'N/A'}</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">P/E Ratio</div>
          <div class="stat-card-val">${pe}</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">52W High</div>
          <div class="stat-card-val accent">${hi52w}</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">52W Low</div>
          <div class="stat-card-val">${lo52w}</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">vs 52W High</div>
          <div class="stat-card-val ${statCardColor(distPct)}">${distPct}</div>
        </div>
      </div>
    </header>

    <!-- ABOUT -->
    <section class="section">
      <h2 class="section-title">About</h2>
      <div class="about-card">
        <p>${ov.description || 'Description not available.'}</p>
        ${metaFields.length ? `
        <div class="about-meta">
          ${metaFields.map(([k,v]) => `
            <div class="meta-item">
              <strong>${v}</strong>${k}
            </div>`).join('')}
        </div>` : ''}
      </div>
    </section>

    <!-- TECHNICAL -->
    <section class="section">
      <h2 class="section-title">Technical — Distance to 52W High</h2>
      <div class="tech-grid">
        <div class="tech-dark">
          <div class="tech-pct ${techPctClass(distPct)}">${distPct}</div>
          <div class="tech-detail">Current price: <strong>${price}</strong></div>
          <div class="tech-detail">52W High: <strong>${hi52w}</strong></div>
          <div class="tech-detail">52W Low: <strong>${lo52w}</strong></div>
          <div class="tech-detail">All-Time High: <strong>${ov.ath || 'N/A'}</strong></div>
        </div>
        <div class="tech-light">
          <h3>Technical Reading</h3>
          <ul>
            <li>Trading <strong>${distPct}</strong> from 52-week high — within screener threshold.</li>
            <li>52-week range: <strong>${lo52w}</strong> to <strong>${hi52w}</strong>.</li>
            <li>All-time high: <strong>${ov.ath || 'N/A'}</strong> (${ov.ath_date || 'date N/A'}).</li>
            <li>Revenue TTM: <strong>${ov.revenue_ttm || 'N/A'}</strong> · EPS TTM: <strong>${ov.eps_ttm || 'N/A'}</strong></li>
            <li>Passed all 7 screener filters — review fundamentals below before acting.</li>
          </ul>
        </div>
      </div>
    </section>

    <!-- CHART -->
    <div class="chart-section">
      <div class="chart-wrap">
        <iframe
          src="https://s.tradingview.com/widgetembed/?symbol=${ticker}&interval=W&theme=dark&style=1&locale=en&toolbarbg=1a1d27&hideideas=1&range=24M&hidetoptoolbar=0&hidesidetoolbar=1&saveimage=0&studies=%5B%5D"
          allowtransparency="true"
          allowfullscreen>
        </iframe>
      </div>
    </div>

    <!-- FINANCIALS -->
    <section class="section">
      <h2 class="section-title">Quarterly Financials <span style="font-weight:400;color:var(--dim);text-transform:none;letter-spacing:0">· $ in millions</span></h2>
      ${finRows.length ? `
      <div class="fin-table-wrap">
        <table class="fin-table">
          <thead>
            <tr>
              <th>Metric</th>
              ${finHeaders.slice(0,6).map(h => `<th>${h}</th>`).join('')}
            </tr>
          </thead>
          <tbody>
            ${finRows.map(([label, vals], i) => `
              <tr class="${PRIORITY_ROWS.includes(label) ? 'priority-row' : ''}${i === priorityRows.length - 1 ? ' priority-sep' : ''}">
                <td>${label}</td>
                ${(Array.isArray(vals) ? vals.slice(0,6) : []).map(v => `<td>${fmtCell(label, v)}</td>`).join('')}
              </tr>`).join('')}
          </tbody>
        </table>
      </div>` : '<p style="color:var(--dim);font-size:12px;padding:16px 0">Financials data not available — run analyze.py again or check stockanalysis.com directly.</p>'}
    </section>

    <!-- NEWS -->
    <section class="section">
      <h2 class="section-title">Recent News</h2>
      <div class="news-grid">${newsHTML}</div>
    </section>

    <!-- FOOTER -->
    <footer>
      <span>${ticker} · Generated ${genDate}</span>
      <span>Source: stockanalysis.com · Data may be delayed</span>
    </footer>
  `;
}

const SERVER = window.BACKEND_URL || 'http://localhost:8765';
let _pollInterval = null;

function showWaiting(ticker, message) {
  document.getElementById('app').innerHTML = `
    <div class="state-screen">
      <div class="spinner"></div>
      <h2>${message}</h2>
      <p>This takes about 30–60 seconds. You'll be redirected automatically.</p>
      <p style="margin-top:16px"><a href="screener.html" style="color:var(--accent)">← Back to Screener</a></p>
    </div>`;
}

function showError(ticker, reason) {
  document.getElementById('app').innerHTML = `
    <div class="state-screen">
      <h2>Analysis unavailable for ${ticker}</h2>
      <p>${reason || 'Could not load data and server is not reachable.'}</p>
      <p style="margin-top:8px">Start the server with <span style="color:var(--gain)">python start.py</span> and try again.</p>
      <p style="margin-top:16px"><a href="screener.html" style="color:var(--accent)">← Back to Screener</a></p>
    </div>`;
}

function startPolling(ticker) {
  if (_pollInterval) return;
  _pollInterval = setInterval(() => {
    fetch(`${SERVER}/status?ticker=${ticker}`)
      .then(r => r.json())
      .then(data => {
        if (data.ready) {
          clearInterval(_pollInterval);
          fetch(`${SERVER}/data/tickers/${ticker}.json`)
            .then(r => r.json())
            .then(render)
            .catch(() => showError(ticker, 'Data file found but could not be parsed.'));
        } else if (data.running) {
          showWaiting(ticker, `Analyzing ${ticker}…`);
        }
      })
      .catch(() => {
        clearInterval(_pollInterval);
        showError(ticker, 'Server went offline during analysis.');
      });
  }, 2000);
}

function reanalyze() {
  const btn = document.getElementById('btnReanalyze');
  if (btn) { btn.disabled = true; btn.textContent = '↺ Starting…'; }
  fetch(`${SERVER}/reanalyze?ticker=${ticker}`)
    .then(r => r.json())
    .then(() => {
      if (btn) btn.textContent = '↺ Analyzing…';
      _pollInterval = null;
      startPolling(ticker);
    })
    .catch(() => {
      if (btn) { btn.disabled = false; btn.textContent = '↺ Re-analyze'; }
    });
}

function triggerAndWait(ticker) {
  showWaiting(ticker, `Starting analysis for ${ticker}…`);
  fetch(`${SERVER}/analyze?ticker=${ticker}`)
    .then(r => r.json())
    .then(() => startPolling(ticker))
    .catch(() => showError(ticker, 'Server is not running.'));
}

// ── Bootstrap ──
const params = new URLSearchParams(window.location.search);
const ticker = (params.get('ticker') || '').toUpperCase();

if (!ticker) {
  document.getElementById('app').innerHTML = `
    <div class="state-screen">
      <h2>No ticker specified</h2>
      <p>Navigate here from a screener card, or add ?ticker=AAPL to the URL.</p>
      <p style="margin-top:16px"><a href="screener.html" style="color:var(--accent)">← Back to Screener</a></p>
    </div>`;
} else {
  // Try loading existing data first; if missing, trigger analysis automatically
  fetch(`${SERVER}/data/tickers/${ticker}.json`)
    .then(r => { if (!r.ok) throw new Error('not found'); return r.json(); })
    .then(render)
    .catch(() => triggerAndWait(ticker));
}
</script>
</body>
</html>
