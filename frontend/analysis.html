<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farseer · Analyzing…</title>
<style>
  :root {
    --surface:  #0f1117;
    --accent:   #6366f1;
    --gain:     #22c55e;
    --loss:     #ef4444;
    --text:     #e5e7eb;
    --muted:    #9ca3af;
    --dim:      #6b7280;
    --border:   #2a2d3a;
    --card:     #1a1d27;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
    background: var(--surface);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    -webkit-font-smoothing: antialiased;
  }

  /* subtle dot grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
    z-index: 0;
  }

  .box {
    position: relative;
    z-index: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 48px 56px;
    width: 100%;
    max-width: 440px;
    text-align: center;
  }

  .ticker-label {
    font-size: 32px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }

  .sub {
    font-size: 12px;
    color: var(--dim);
    margin-bottom: 36px;
  }

  /* spinner */
  .spinner {
    width: 56px;
    height: 56px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    margin: 0 auto 32px;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .status-msg {
    font-size: 13px;
    color: var(--muted);
    min-height: 20px;
    margin-bottom: 24px;
    transition: color 0.3s;
  }
  .status-msg.done { color: var(--gain); }
  .status-msg.error { color: var(--loss); }

  .back-link {
    font-size: 12px;
    color: var(--dim);
    text-decoration: none;
  }
  .back-link:hover { color: var(--accent); }

  .btn-retry {
    display: inline-block;
    margin-top: 16px;
    background: rgba(99,102,241,0.1);
    border: 1px solid rgba(99,102,241,0.3);
    color: var(--accent);
    padding: 8px 20px;
    border-radius: 6px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s;
    text-decoration: none;
  }
  .btn-retry:hover { background: rgba(99,102,241,0.2); }
</style>
</head>
<body>

<div class="box" id="box">
  <div class="spinner" id="spinner"></div>
  <div class="ticker-label" id="tickerLabel">…</div>
  <div class="sub" id="subLabel">Generating fundamental analysis</div>
  <div class="status-msg" id="statusMsg">Requesting analysis…</div>
  <a href="screener.html" class="back-link">← Back to Screener</a>
</div>

<script src="config.js"></script>
<script>
const SERVER = window.BACKEND_URL || 'http://localhost:8765';
const params = new URLSearchParams(window.location.search);
const ticker = (params.get('ticker') || '').toUpperCase();

const elTicker  = document.getElementById('tickerLabel');
const elSub     = document.getElementById('subLabel');
const elStatus  = document.getElementById('statusMsg');
const elSpinner = document.getElementById('spinner');

if (!ticker) {
  elTicker.textContent = 'No ticker';
  elSub.textContent = 'Add ?ticker=AAPL to the URL.';
  elSpinner.style.display = 'none';
} else {
  document.title = `Farseer · ${ticker}`;
  elTicker.textContent = ticker;

  let pollTimer = null;
  let pollCount = 0;
  const MAX_POLLS = 300; // 10 min at 2s interval

  function setStatus(msg, cls) {
    elStatus.textContent = msg;
    elStatus.className = 'status-msg' + (cls ? ' ' + cls : '');
  }

  function redirect() {
    setStatus('Analysis ready — opening…', 'done');
    elSpinner.style.borderTopColor = 'var(--gain)';
    // Use the server URL so the static HTML report is served correctly
    setTimeout(() => {
      window.location.href = SERVER + '/data/tickers/' + ticker + '_analisis.html';
    }, 400);
  }

  function showError(msg) {
    clearInterval(pollTimer);
    elSpinner.style.display = 'none';
    setStatus(msg, 'error');
    const box = document.getElementById('box');
    if (!box.querySelector('.btn-retry')) {
      const btn = document.createElement('a');
      btn.className = 'btn-retry';
      btn.href = 'analysis.html?ticker=' + ticker;
      btn.textContent = '↺ Try again';
      box.appendChild(btn);
    }
  }

  function poll() {
    pollCount++;
    if (pollCount > MAX_POLLS) {
      showError('Timed out after 10 minutes. The server may still be running — try refreshing.');
      return;
    }
    fetch(SERVER + '/status?ticker=' + ticker)
      .then(r => r.json())
      .then(data => {
        if (data.ready) {
          redirect();
        } else if (data.running) {
          setStatus('Analyzing… please wait');
        } else {
          setStatus('Waiting in queue…');
        }
      })
      .catch(e => showError('Server unreachable: ' + e.message));
  }

  // Kick off analysis, then start polling
  fetch(SERVER + '/analyze?ticker=' + ticker)
    .then(r => r.json())
    .then(data => {
      if (data.error) {
        showError(data.error);
        return;
      }
      setStatus('Analysis started — this takes about 10–20 seconds');
      pollTimer = setInterval(poll, 2000);
    })
    .catch(e => showError('Server not reachable: ' + e.message));
}
</script>
</body>
</html>
